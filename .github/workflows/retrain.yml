name: Retrain Model Pipeline

on:
  repository_dispatch:
    types: [retrain_model]

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run retraining
        run: |
          python src/retrain_pipeline.py

      - name: Commit updated model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

          git add models/model.pkl
          git commit -m "Auto retrained model" || echo "No changes"
          git push