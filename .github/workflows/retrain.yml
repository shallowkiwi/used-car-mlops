name: Manual Model Retraining

on:
  workflow_dispatch:

jobs:
  retrain:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repo
      uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: 3.10

    - name: Install dependencies
      run: |
        pip install -r requirements.txt

    - name: Train model
      run: |
        python src/train.py

    - name: Commit new model
      run: |
        git config --global user.name "github-actions"
        git config --global user.email "actions@github.com"
        git add models/model.pkl models/shadow_model.pkl artifacts/drift_reference.json
        git commit -m "Auto retrained model" || echo "No changes to commit"
        git push