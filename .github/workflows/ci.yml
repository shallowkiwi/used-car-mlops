name: CI-CD Pipeline
name: CI Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build-test-deploy:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install dependencies
      run: |
        
        pip install -r requirements.txt

    - name: Run training script
      run: |
        
        python src/train.py

    - name: Build Docker Image
      run: |
        
        docker build -t used-car-mlops .

    - name: Deploy to Kubernetes
      run: |
        echo "kubectl apply -f k8s-deployment.yaml"
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run training script
        run: |
          python src/train.py
