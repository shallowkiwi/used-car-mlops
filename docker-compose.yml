version: "3.9"

services:
  api:
    build: .
    container_name: used_car_api
    ports:
      - "8000:8000"
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    restart: always

  dashboard:
    build: .
    container_name: used_car_dashboard
    command: streamlit run app/dashboard.py --server.port 8501 --server.address 0.0.0.0
    ports:
      - "8501:8501"
    volumes:
      - ./logs:/app/logs
    depends_on:
      - api
    restart: always